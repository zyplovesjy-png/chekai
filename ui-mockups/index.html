<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>扯旋房间 UI 视觉稿 · 双风格预览</title>
  <style>
    :root {
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background: #111;
      color: #eee;
    }
    .chooser {
      max-width: 480px;
      margin: 0 auto;
      padding: calc(20px + var(--safe-t)) 16px calc(24px + var(--safe-b));
    }
    .chooser h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      font-weight: 700;
    }
    .chooser p {
      margin: 0 0 18px;
      font-size: 0.82rem;
      color: #999;
      line-height: 1.5;
    }
    .cards { display: grid; gap: 12px; }
    .card-link {
      display: block;
      text-decoration: none;
      color: inherit;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: #1a1a1a;
    }
    .card-link .preview {
      height: 120px;
      position: relative;
    }
    .card-link.tea .preview {
      background:
        radial-gradient(80% 80% at 50% 40%, #2f6b4f 0%, transparent 60%),
        linear-gradient(180deg, #1a3d2e, #0d2118);
    }
    .card-link.neon .preview {
      background:
        radial-gradient(70% 70% at 50% 45%, #1a3a5c 0%, transparent 55%),
        linear-gradient(180deg, #0b1220, #05080f);
    }
    .card-link .preview::after {
      content: "";
      position: absolute;
      left: 18%;
      right: 18%;
      top: 28%;
      bottom: 22%;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.12);
    }
    .card-link.tea .preview::after { border-color: rgba(212,175,55,0.35); background: rgba(20,80,55,0.35); }
    .card-link.neon .preview::after { border-color: rgba(80,180,255,0.35); background: rgba(20,40,70,0.4); }
    .card-body { padding: 14px 16px 16px; }
    .card-body h2 { margin: 0 0 4px; font-size: 1.05rem; }
    .card-body span { font-size: 0.75rem; color: #888; line-height: 1.4; display: block; }
    .note {
      margin-top: 18px;
      font-size: 0.7rem;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="chooser">
    <h1>房间 UI 视觉稿</h1>
    <p>两套静态稿，仅 HTML/CSS。牌面为正式客户端同款扑克样式（点数+花色）。8 人满座；他人不显示暗牌，只显示第3/4张；比牌时头尾四张。页内可切换「下注 / 比牌」。</p>
    <div class="cards">
      <a class="card-link tea" href="./style-tea.html">
        <div class="preview"></div>
        <div class="card-body">
          <h2>风格一 · 茶馆扯旋</h2>
          <span>深绿绒面、暖金、木色边。偏传统牌局氛围。</span>
        </div>
      </a>
      <a class="card-link neon" href="./style-neon.html">
        <div class="preview"></div>
        <div class="card-body">
          <h2>风格二 · 现代手游桌</h2>
          <span>深蓝夜场、青蓝高光、大触控。偏德州类手游。</span>
        </div>
      </a>
    </div>
    <p class="note">
      约定：观战 / 对局记录收进右上角菜单；顶栏只留房号与局数。<br />
      路径：ui-mockups/ · 不改动正式房间代码。
    </p>
  </div>
</body>
</html>
