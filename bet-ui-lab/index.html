<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>下注交互实验室 · 四方案对比</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet" />
  <style>
    :root {
      --felt: #0f3d2e;
      --felt-deep: #0a2a20;
      --ink: #e8f0ea;
      --muted: rgba(232, 240, 234, 0.55);
      --gold: #e2c36b;
      --gold-soft: #c9a84a;
      --danger: #e07a5f;
      --ok: #7dcea0;
      --panel: rgba(8, 22, 18, 0.92);
      --line: rgba(226, 195, 107, 0.28);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Noto Sans SC", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(120% 80% at 50% 0%, #1a5c45 0%, transparent 55%),
        linear-gradient(180deg, #123d30 0%, var(--felt-deep) 45%, #071612 100%);
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.07;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: calc(12px + var(--safe-t)) 14px calc(12px + var(--safe-b));
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }
    header h1 {
      margin: 0;
      font-family: "ZCOOL XiaoWei", "Noto Sans SC", serif;
      font-size: 1.45rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      color: var(--gold);
    }
    header p {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin: 8px 0 12px;
    }
    .tab {
      border: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.28);
      color: var(--muted);
      border-radius: 999px;
      padding: 8px 0;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .tab.active {
      color: #1a1408;
      background: linear-gradient(180deg, #f0d78c, var(--gold-soft));
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(226, 195, 107, 0.25);
    }

    .scene {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        radial-gradient(80% 60% at 50% 35%, rgba(46, 120, 90, 0.45), transparent 70%),
        linear-gradient(180deg, rgba(18, 70, 52, 0.9), rgba(8, 28, 22, 0.95));
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04), 0 18px 40px rgba(0,0,0,0.35);
    }

    .table-info {
      padding: 14px 14px 8px;
      display: grid;
      gap: 8px;
    }
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .pill {
      font-size: 0.68rem;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
    }
    .pill strong { color: var(--gold); font-weight: 700; }
    .scheme-blurb {
      font-size: 0.78rem;
      line-height: 1.45;
      color: rgba(232, 240, 234, 0.82);
      min-height: 2.9em;
    }
    .scheme-blurb b { color: var(--gold); font-weight: 700; }

    .log {
      margin: 0 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.06);
      min-height: 72px;
      max-height: 96px;
      overflow: auto;
      font-size: 0.72rem;
      color: var(--muted);
    }
    .log .item { margin: 0 0 4px; }
    .log .item em {
      font-style: normal;
      color: var(--ok);
      font-weight: 700;
    }

    .spacer { flex: 1; min-height: 24px; }

    .controls {
      padding: 10px 12px calc(12px + var(--safe-b));
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.45) 30%);
    }

    .mode-switch {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .mode-switch button {
      flex: 1;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,0.3);
      color: var(--muted);
      padding: 8px;
      font-size: 0.72rem;
      font-weight: 600;
    }
    .mode-switch button.on {
      color: #1a1408;
      background: var(--gold);
      border-color: transparent;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 999px;
      font-family: inherit;
      font-weight: 700;
      color: #142018;
      background: linear-gradient(180deg, #f4e2a8, var(--gold-soft));
      box-shadow: 0 3px 0 #8a6d28, 0 8px 16px rgba(0,0,0,0.25);
      min-height: 44px;
      padding: 0 16px;
      font-size: 0.92rem;
      transition: transform 0.08s ease, filter 0.15s;
    }
    .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #8a6d28; }
    .btn.ghost {
      color: var(--ink);
      background: rgba(255,255,255,0.08);
      box-shadow: none;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .btn.danger {
      color: #fff;
      background: linear-gradient(180deg, #ef9a82, var(--danger));
      box-shadow: 0 3px 0 #8a3d2c;
    }
    .btn.wide { width: 100%; }
    .btn:disabled { filter: grayscale(0.5) brightness(0.7); }

    .row { display: flex; gap: 8px; align-items: stretch; }
    .row > * { flex: 1; }

    /* ===== Scheme panels ===== */
    .panel { display: none; }
    .panel.active { display: block; }

    .hint {
      font-size: 0.68rem;
      color: var(--muted);
      text-align: center;
      margin: 6px 0 0;
      min-height: 1.2em;
    }

    /* A: main button + embedded slider */
    .a-main {
      position: relative;
      width: 100%;
      border-radius: 18px;
      padding: 12px 14px 14px;
      background: linear-gradient(180deg, #f4e2a8, var(--gold-soft));
      color: #1a1408;
      box-shadow: 0 4px 0 #8a6d28, 0 12px 24px rgba(0,0,0,0.28);
      touch-action: none;
      user-select: none;
    }
    .a-main .title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-weight: 900;
      font-size: 1.15rem;
    }
    .a-main .title small {
      font-size: 0.72rem;
      font-weight: 600;
      opacity: 0.7;
    }
    .a-track {
      margin-top: 10px;
      height: 28px;
      border-radius: 999px;
      background: rgba(0,0,0,0.18);
      position: relative;
      touch-action: none;
    }
    .a-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 40%;
      border-radius: 999px;
      background: rgba(26, 20, 8, 0.35);
    }
    .a-thumb {
      position: absolute;
      top: 50%;
      width: 26px;
      height: 26px;
      margin-top: -13px;
      margin-left: -13px;
      border-radius: 50%;
      background: #1a1408;
      box-shadow: 0 2px 6px rgba(0,0,0,0.35);
      left: 40%;
    }
    .a-side { margin-top: 10px; }

    /* B: full-width horizontal slider + confirm */
    .b-rail {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .b-amount {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 0.02em;
    }
    .b-amount span {
      display: block;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .b-slider {
      width: 100%;
      margin: 10px 0 4px;
      accent-color: var(--gold);
      height: 28px;
    }
    .b-ends {
      display: flex;
      justify-content: space-between;
      font-size: 0.68rem;
      color: var(--muted);
    }

    /* C: chips */
    .chips {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }
    .chip {
      min-height: 52px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,0.35);
      color: var(--ink);
      font-weight: 700;
      font-size: 0.78rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .chip small { font-size: 0.62rem; color: var(--muted); font-weight: 500; }
    .chip.on {
      color: #1a1408;
      background: linear-gradient(180deg, #f0d78c, var(--gold-soft));
      border-color: transparent;
    }

    /* D: press & drag up */
    .d-zone {
      position: relative;
      height: 168px;
      border-radius: 18px;
      border: 1px dashed rgba(226, 195, 107, 0.35);
      background: rgba(0,0,0,0.22);
      overflow: hidden;
      margin-bottom: 10px;
      touch-action: none;
    }
    .d-guide {
      position: absolute;
      inset: 10px 12px auto;
      font-size: 0.68rem;
      color: var(--muted);
      text-align: center;
      pointer-events: none;
    }
    .d-amount {
      position: absolute;
      left: 0; right: 0;
      top: 36%;
      text-align: center;
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--gold);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .d-zone.dragging .d-amount { opacity: 1; }
    .d-btn {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(220px, 70%);
      min-height: 52px;
      border-radius: 999px;
      border: 0;
      font-family: inherit;
      font-weight: 900;
      font-size: 1.05rem;
      color: #1a1408;
      background: linear-gradient(180deg, #f4e2a8, var(--gold-soft));
      box-shadow: 0 4px 0 #8a6d28;
      touch-action: none;
    }
    .d-zone.dragging .d-btn {
      transform: translateX(-50%) translateY(var(--lift, 0px));
      filter: brightness(1.05);
    }
    .d-fill {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 0%;
      background: linear-gradient(180deg, rgba(226,195,107,0.15), rgba(226,195,107,0.05));
      pointer-events: none;
    }

    .footer-note {
      margin-top: 10px;
      font-size: 0.65rem;
      color: rgba(232,240,234,0.4);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>下注交互实验室</h1>
      <p>独立测试页，不改动正式对局代码。用手机点按/滑动试四种方案，下方会记录你的操作。</p>
    </header>

    <div class="tabs" role="tablist">
      <button class="tab active" data-scheme="A">A 嵌钮</button>
      <button class="tab" data-scheme="B">B 横轨</button>
      <button class="tab" data-scheme="C">C 档位</button>
      <button class="tab" data-scheme="D">D 上滑</button>
    </div>

    <div class="scene">
      <div class="table-info">
        <div class="pill-row">
          <span class="pill">场景：<strong id="sceneLabel">未开叫 · 叫分</strong></span>
          <span class="pill">最低：<strong id="minLabel">10</strong></span>
          <span class="pill">当前最高：<strong id="curLabel">0</strong></span>
          <span class="pill">我的簸簸：<strong id="stackLabel">200</strong></span>
        </div>
        <div class="scheme-blurb" id="blurb"></div>
        <div class="log" id="log" aria-live="polite"></div>
      </div>

      <div class="spacer"></div>

      <div class="controls">
        <div class="mode-switch">
          <button type="button" id="modeCall" class="on">未开叫（叫）</button>
          <button type="button" id="modeRaise">已开叫（返）</button>
        </div>

        <!-- A -->
        <div class="panel active" id="panelA">
          <div class="row a-side">
            <button class="btn ghost" data-act="rest">休</button>
            <button class="btn danger" data-act="fold">丢</button>
            <button class="btn ghost" data-act="knock">敲</button>
          </div>
          <div style="height:10px"></div>
          <div class="a-main" id="aMain">
            <div class="title">
              <span id="aActionText">叫 10</span>
              <small>点按钮提交 · 拖条改金额</small>
            </div>
            <div class="a-track" id="aTrack">
              <div class="a-fill" id="aFill"></div>
              <div class="a-thumb" id="aThumb"></div>
            </div>
          </div>
          <p class="hint" id="aHint">单击金色区域提交；拖中间圆点改金额</p>
        </div>

        <!-- B -->
        <div class="panel" id="panelB">
          <div class="b-rail">
            <div class="b-amount"><span id="bCaption">叫分金额</span><strong id="bAmount">10</strong></div>
            <input class="b-slider" id="bSlider" type="range" min="10" max="200" step="1" value="10" />
            <div class="b-ends"><span id="bMin">10</span><span id="bMax">200</span></div>
          </div>
          <div class="row">
            <button class="btn ghost" data-act="rest">休</button>
            <button class="btn danger" data-act="fold">丢</button>
            <button class="btn ghost" data-act="knock">敲</button>
            <button class="btn" id="bConfirm">叫 10</button>
          </div>
          <p class="hint">先横滑选金额，再点右侧主按钮确认</p>
        </div>

        <!-- C -->
        <div class="panel" id="panelC">
          <div class="chips" id="cChips"></div>
          <div class="row">
            <button class="btn ghost" data-act="rest">休</button>
            <button class="btn danger" data-act="fold">丢</button>
            <button class="btn ghost" data-act="knock">敲</button>
            <button class="btn" id="cConfirm">叫 10</button>
          </div>
          <p class="hint">点档位选金额，再点主按钮；也可双击档位直接下注</p>
        </div>

        <!-- D -->
        <div class="panel" id="panelD">
          <div class="d-zone" id="dZone">
            <div class="d-fill" id="dFill"></div>
            <div class="d-guide">轻点 = 最低额 · 按住上滑加大 · 松手提交</div>
            <div class="d-amount" id="dAmount">10</div>
            <button class="d-btn" id="dBtn" type="button">叫</button>
          </div>
          <div class="row">
            <button class="btn ghost" data-act="rest">休</button>
            <button class="btn danger" data-act="fold">丢</button>
            <button class="btn ghost" data-act="knock">敲</button>
            <button class="btn ghost" id="dSee" style="display:none">瞧</button>
          </div>
          <p class="hint" id="dHint">按住金色按钮向上拖，松手即下注</p>
        </div>
      </div>
    </div>

    <p class="footer-note">文件位置：bet-ui-lab/index.html · 与正式房间代码无关</p>
  </div>

  <script>
    const STATE = {
      scheme: 'A',
      mode: 'call', // call | raise
      stack: 200,
      minBet: 10,
      currentBet: 0,
      amount: 10,
    };

    const BLURBS = {
      A: '<b>方案 A · 主按钮内嵌滑条</b>：金额写在「叫/返」大按钮上。拖按钮内滑条改金额，再点按钮提交。休/丢/敲仍是一键。',
      B: '<b>方案 B · 全宽横轨 + 确认</b>：中间一条好滑的横向金额轨，主按钮文案实时变成「叫 42 / 返 60」，点主按钮才提交。',
      C: '<b>方案 C · 快捷档位</b>：最低 / 1/4 / 一半 / 全下。点选后点主按钮；双击档位可直接下注。',
      D: '<b>方案 D · 按住上滑</b>：轻点主按钮=最低额并提交；按住向上拖加大金额，松手提交。偏手游手感。',
    };

    const logEl = document.getElementById('log');
    const blurbEl = document.getElementById('blurb');

    function clamp(n, a, b) { return Math.max(a, Math.min(b, n)); }

    function sliderBounds() {
      if (STATE.mode === 'raise') {
        const min = STATE.currentBet + 1;
        return { min, max: Math.max(min, STATE.stack) };
      }
      return { min: STATE.minBet, max: Math.max(STATE.minBet, STATE.stack) };
    }

    function actionVerb() {
      return STATE.mode === 'raise' ? '返' : '叫';
    }

    function syncScenePills() {
      document.getElementById('sceneLabel').textContent =
        STATE.mode === 'raise' ? '已开叫 · 返分' : '未开叫 · 叫分';
      document.getElementById('minLabel').textContent = String(STATE.minBet);
      document.getElementById('curLabel').textContent = String(STATE.currentBet);
      document.getElementById('stackLabel').textContent = String(STATE.stack);
    }

    function pushLog(text) {
      const item = document.createElement('div');
      item.className = 'item';
      const t = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      item.innerHTML = `<em>${t}</em> · [${STATE.scheme}] ${text}`;
      logEl.prepend(item);
    }

    function setAmount(v, { fromUser } = {}) {
      const { min, max } = sliderBounds();
      STATE.amount = clamp(Math.round(v), min, max);
      renderScheme();
      if (fromUser && navigator.vibrate) {
        // light tick sparingly — only on scheme A/D drag ends handled elsewhere
      }
    }

    function submitPrimary() {
      pushLog(`提交 <b style="color:var(--gold)">${actionVerb()} ${STATE.amount}</b>`);
      if (STATE.mode === 'call') {
        // simulate table moved
        STATE.mode = 'raise';
        STATE.currentBet = STATE.amount;
        document.getElementById('modeCall').classList.remove('on');
        document.getElementById('modeRaise').classList.add('on');
        const { min } = sliderBounds();
        STATE.amount = min;
        syncScenePills();
        renderAll();
        pushLog('模拟：桌面已开叫，切换到「返」场景');
      }
    }

    function sideAction(act) {
      const map = { rest: '休', fold: '丢', knock: `敲（全下 ${STATE.stack}）`, see: `瞧（跟 ${STATE.currentBet}）` };
      pushLog(map[act] || act);
    }

    /* ---------- A ---------- */
    function renderA() {
      const { min, max } = sliderBounds();
      const ratio = max === min ? 1 : (STATE.amount - min) / (max - min);
      document.getElementById('aActionText').textContent = `${actionVerb()} ${STATE.amount}`;
      document.getElementById('aFill').style.width = `${ratio * 100}%`;
      document.getElementById('aThumb').style.left = `${ratio * 100}%`;
      // hide rest in raise mode conceptually — still show for compare
      const restBtn = document.querySelector('#panelA [data-act="rest"]');
      restBtn.style.display = STATE.mode === 'raise' ? 'none' : '';
      let see = document.getElementById('aSee');
      if (STATE.mode === 'raise') {
        if (!see) {
          see = document.createElement('button');
          see.id = 'aSee';
          see.className = 'btn ghost';
          see.textContent = '瞧';
          see.addEventListener('click', () => sideAction('see'));
          restBtn.parentElement.appendChild(see);
        }
        see.style.display = '';
      } else if (see) see.style.display = 'none';
    }

    function bindA() {
      const track = document.getElementById('aTrack');
      const main = document.getElementById('aMain');
      let dragging = false;

      const posToAmount = (clientX) => {
        const rect = track.getBoundingClientRect();
        const ratio = clamp((clientX - rect.left) / rect.width, 0, 1);
        const { min, max } = sliderBounds();
        return min + ratio * (max - min);
      };

      const onMove = (e) => {
        if (!dragging) return;
        const x = e.touches ? e.touches[0].clientX : e.clientX;
        setAmount(posToAmount(x));
      };
      const onUp = () => { dragging = false; };

      track.addEventListener('pointerdown', (e) => {
        dragging = true;
        track.setPointerCapture(e.pointerId);
        setAmount(posToAmount(e.clientX));
        e.stopPropagation();
      });
      track.addEventListener('pointermove', onMove);
      track.addEventListener('pointerup', onUp);
      track.addEventListener('pointercancel', onUp);

      // click main (not track) submits
      main.addEventListener('click', (e) => {
        if (track.contains(e.target)) return;
        submitPrimary();
      });
    }

    /* ---------- B ---------- */
    function renderB() {
      const { min, max } = sliderBounds();
      const slider = document.getElementById('bSlider');
      slider.min = min;
      slider.max = max;
      slider.value = STATE.amount;
      document.getElementById('bAmount').textContent = String(STATE.amount);
      document.getElementById('bCaption').textContent = STATE.mode === 'raise' ? '返分金额' : '叫分金额';
      document.getElementById('bMin').textContent = String(min);
      document.getElementById('bMax').textContent = String(max);
      document.getElementById('bConfirm').textContent = `${actionVerb()} ${STATE.amount}`;
      document.querySelector('#panelB [data-act="rest"]').style.display = STATE.mode === 'raise' ? 'none' : '';
      let see = document.getElementById('bSee');
      if (STATE.mode === 'raise') {
        if (!see) {
          see = document.createElement('button');
          see.id = 'bSee';
          see.className = 'btn ghost';
          see.textContent = '瞧';
          see.addEventListener('click', () => sideAction('see'));
          document.querySelector('#panelB .row').insertBefore(see, document.getElementById('bConfirm'));
        }
        see.style.display = '';
      } else if (see) see.style.display = 'none';
    }

    function bindB() {
      document.getElementById('bSlider').addEventListener('input', (e) => {
        setAmount(Number(e.target.value));
      });
      document.getElementById('bConfirm').addEventListener('click', submitPrimary);
    }

    /* ---------- C ---------- */
    function chipValues() {
      const { min, max } = sliderBounds();
      const quarter = clamp(Math.round(min + (max - min) * 0.25), min, max);
      const half = clamp(Math.round(min + (max - min) * 0.5), min, max);
      return [
        { key: 'min', label: '最低', value: min },
        { key: 'q', label: '1/4', value: quarter },
        { key: 'half', label: '一半', value: half },
        { key: 'max', label: '全下', value: max },
      ];
    }

    function renderC() {
      const box = document.getElementById('cChips');
      const chips = chipValues();
      box.innerHTML = '';
      chips.forEach((c) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'chip' + (STATE.amount === c.value ? ' on' : '');
        btn.innerHTML = `${c.label}<small>${c.value}</small>`;
        let lastTap = 0;
        btn.addEventListener('click', () => {
          const now = Date.now();
          setAmount(c.value);
          if (now - lastTap < 320) {
            submitPrimary();
            lastTap = 0;
          } else {
            lastTap = now;
          }
        });
        box.appendChild(btn);
      });
      document.getElementById('cConfirm').textContent = `${actionVerb()} ${STATE.amount}`;
      document.querySelector('#panelC [data-act="rest"]').style.display = STATE.mode === 'raise' ? 'none' : '';
      let see = document.getElementById('cSee');
      if (STATE.mode === 'raise') {
        if (!see) {
          see = document.createElement('button');
          see.id = 'cSee';
          see.className = 'btn ghost';
          see.textContent = '瞧';
          see.addEventListener('click', () => sideAction('see'));
          document.querySelector('#panelC .row').insertBefore(see, document.getElementById('cConfirm'));
        }
        see.style.display = '';
      } else if (see) see.style.display = 'none';
    }

    function bindC() {
      document.getElementById('cConfirm').addEventListener('click', submitPrimary);
    }

    /* ---------- D ---------- */
    function renderD() {
      document.getElementById('dBtn').textContent = actionVerb();
      document.getElementById('dAmount').textContent = String(STATE.amount);
      document.getElementById('dSee').style.display = STATE.mode === 'raise' ? '' : 'none';
      document.querySelector('#panelD [data-act="rest"]').style.display = STATE.mode === 'raise' ? 'none' : '';
    }

    function bindD() {
      const zone = document.getElementById('dZone');
      const btn = document.getElementById('dBtn');
      const fill = document.getElementById('dFill');
      let startY = 0;
      let startAmount = 0;
      let dragging = false;
      let moved = false;
      const DRAG_RANGE = 120; // px for full range

      const onDown = (e) => {
        dragging = true;
        moved = false;
        startY = e.clientY ?? e.touches?.[0]?.clientY;
        startAmount = sliderBounds().min;
        STATE.amount = startAmount;
        zone.classList.add('dragging');
        zone.style.setProperty('--lift', '0px');
        fill.style.height = '0%';
        renderD();
        btn.setPointerCapture?.(e.pointerId);
        e.preventDefault();
      };

      const onMove = (e) => {
        if (!dragging) return;
        const y = e.clientY ?? e.touches?.[0]?.clientY;
        const dy = startY - y; // up = positive
        if (Math.abs(dy) > 6) moved = true;
        const { min, max } = sliderBounds();
        const ratio = clamp(dy / DRAG_RANGE, 0, 1);
        const amt = min + ratio * (max - min);
        setAmount(amt);
        const lift = -Math.min(dy, DRAG_RANGE) * 0.35;
        zone.style.setProperty('--lift', `${lift}px`);
        fill.style.height = `${ratio * 85}%`;
        document.getElementById('dAmount').textContent = String(STATE.amount);
      };

      const onUp = () => {
        if (!dragging) return;
        dragging = false;
        zone.classList.remove('dragging');
        zone.style.setProperty('--lift', '0px');
        fill.style.height = '0%';
        // tap without drag = min bet submit; drag = submit current
        submitPrimary();
        moved = false;
      };

      btn.addEventListener('pointerdown', onDown);
      btn.addEventListener('pointermove', onMove);
      btn.addEventListener('pointerup', onUp);
      btn.addEventListener('pointercancel', onUp);
      document.getElementById('dSee').addEventListener('click', () => sideAction('see'));
    }

    /* ---------- shared ---------- */
    function renderScheme() {
      if (STATE.scheme === 'A') renderA();
      if (STATE.scheme === 'B') renderB();
      if (STATE.scheme === 'C') renderC();
      if (STATE.scheme === 'D') renderD();
    }

    function renderAll() {
      blurbEl.innerHTML = BLURBS[STATE.scheme];
      document.querySelectorAll('.panel').forEach((p) => p.classList.remove('active'));
      document.getElementById('panel' + STATE.scheme).classList.add('active');
      document.querySelectorAll('.tab').forEach((t) => {
        t.classList.toggle('active', t.dataset.scheme === STATE.scheme);
      });
      syncScenePills();
      renderScheme();
    }

    function resetAmountToMin() {
      STATE.amount = sliderBounds().min;
    }

    document.querySelectorAll('.tab').forEach((tab) => {
      tab.addEventListener('click', () => {
        STATE.scheme = tab.dataset.scheme;
        resetAmountToMin();
        renderAll();
        pushLog(`切换到方案 ${STATE.scheme}`);
      });
    });

    document.getElementById('modeCall').addEventListener('click', () => {
      STATE.mode = 'call';
      STATE.currentBet = 0;
      document.getElementById('modeCall').classList.add('on');
      document.getElementById('modeRaise').classList.remove('on');
      resetAmountToMin();
      renderAll();
    });
    document.getElementById('modeRaise').addEventListener('click', () => {
      STATE.mode = 'raise';
      STATE.currentBet = Math.max(STATE.minBet, 30);
      document.getElementById('modeRaise').classList.add('on');
      document.getElementById('modeCall').classList.remove('on');
      resetAmountToMin();
      renderAll();
    });

    document.querySelectorAll('[data-act]').forEach((btn) => {
      btn.addEventListener('click', () => sideAction(btn.dataset.act));
    });

    bindA();
    bindB();
    bindC();
    bindD();
    renderAll();
    pushLog('实验室就绪，用手机试试四种方案');
  </script>
</body>
</html>
